[files]
extend-exclude = [
    "assets/screencast.svg",
    "fixtures/bench",
    "fixtures/text_fragments/index.html",
    "fixtures/fragments/special-casing.md",
    "fixtures/fragments/special-casing.html",
]

[default.extend-words]
excluder = "excluder"

[default]
extend-ignore-re = [
  # Ignore the line after `// spellchecker:ignore-next-line`:
  "(#|//|///|//!)\\s*spellchecker:ignore-next-line\\n.*",
]
