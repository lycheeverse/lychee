[files]
extend-exclude = [
    "assets/screencast.svg",
    "fixtures/bench",
    "fixtures/text_fragments/index.html",
]

[default.extend-words]
excluder = "excluder"

[default]
extend-ignore-re = [
  # Ignore the line after `// spellchecker:ignore-next-line`:
  "(#|//)\\s*spellchecker\\s*:\\s*ignore-next-line\\n.*",
]
